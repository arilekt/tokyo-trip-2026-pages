<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>โตเกียว ทริป 2026 (Tokyo Trip 2026) - รายการจัดของ (Packing List)</title>
<link href="../favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="../asset/css/common.css" rel="stylesheet"/>
<link href="../asset/css/professional-v2.css" rel="stylesheet"/>
<style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #00838f;
            margin-bottom: 30px;
            border-bottom: 2px solid #b2ebf2;
            padding-bottom: 10px;
        }

        .checklist-category {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #006064;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            background: #e0f7fa;
            padding: 10px;
            border-radius: 8px;
        }

        .category-icon {
            margin-right: 10px;
            font-size: 1.5em;
        }

        .checklist-items {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
        }

        .checklist-item {
            background: #fafafa;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .checklist-item:hover {
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        .item-checkbox {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            accent-color: #00838f;
            cursor: pointer;
        }

        .item-label {
            flex-grow: 1;
            cursor: pointer;
        }

        .item-note {
            font-size: 0.8em;
            color: #666;
            margin-left: 5px;
            display: block;
        }

        .important-tag {
            background: #ffcdd2;
            color: #c62828;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: bold;
            margin-left: 5px;
        }

        .winter-tag {
            background: #e1f5fe;
            color: #0277bd;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: bold;
            margin-left: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .checklist-items {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
<h1>🎒 Bag packing list (Tokyo Trip 2026)</h1>
<div class="checklist-category">
<div class="category-title">
<span class="category-icon">📄</span> Important Documents
            </div>
<ul class="checklist-items">
<li class="checklist-item">
<input class="item-checkbox" id="doc1" type="checkbox"/>
<label class="item-label" for="doc1">Passport <span class="important-tag">Don't forget!</span><span class="item-note">Age remaining &gt; 6
                            month</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="doc2" type="checkbox"/>
<label class="item-label" for="doc2">Visit Japan Web (QR Code) <span class="important-tag">important</span><span class="item-note">Capture the screen as well.</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="doc3" type="checkbox"/>
<label class="item-label" for="doc3">Hotel reservation (Booking Voucher)<span class="item-note">Print/Save PDF</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="doc4" type="checkbox"/>
<label class="item-label" for="doc4">Airline tickets (E-Ticket)<span class="item-note">Thai Lion Air
                            / AirAsia X</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="doc5" type="checkbox"/>
<label class="item-label" for="doc5">Travel insurance policy<span class="item-note">Print/save file</span></label>
</li>
</ul>
</div>
<div class="checklist-category">
<div class="category-title">
<span class="category-icon">💵</span> Money &amp; Cards
            </div>
<ul class="checklist-items">
<li class="checklist-item">
<input class="item-checkbox" id="money1" type="checkbox"/>
<label class="item-label" for="money1">JPY Cash<span class="item-note">Exchange it moderately.</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="money2" type="checkbox"/>
<label class="item-label" for="money2">Travel Card (YouTrip/Planet/etc.)<span class="item-note">Ready to top up</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="money3" type="checkbox"/>
<label class="item-label" for="money3">Credit Card<span class="item-note">emergency reserve</span></label>
</li>
</ul>
</div>
<div class="checklist-category">
<div class="category-title">
<span class="category-icon">📱</span> electronics (Electronics)
            </div>
<ul class="checklist-items">
<li class="checklist-item">
<input class="item-checkbox" id="elec1" type="checkbox"/>
<label class="item-label" for="elec1">Universal Adapter<span class="item-note">Japan uses 2 flat legs (Type A).</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="elec2" type="checkbox"/>
<label class="item-label" for="elec2">Power Bank<span class="item-note">Carry-on only
                            (Do not download)</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="elec3" type="checkbox"/>
<label class="item-label" for="elec3">Mobile charging cables (Charging Cables)</label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="elec4" type="checkbox"/>
<label class="item-label" for="elec4">SIM card / Pocket WiFi<span class="item-note">Sim2Fly / Sugoi
                            SIM</span></label>
</li>
</ul>
</div>
<div class="checklist-category">
<div class="category-title">
<span class="category-icon">🧥</span> Winter Gear <span class="winter-tag">Palcall &amp; Fuji (0-10°C)</span>
</div>
<ul class="checklist-items">
<li class="checklist-item">
<input class="item-checkbox" id="wear1" type="checkbox"/>
<label class="item-label" for="wear1">Heattech shirt / long johns<span class="item-note">Winter-proof inner layer</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="wear2" type="checkbox"/>
<label class="item-label" for="wear2">Knit shirt / Fleece<span class="item-note">The middle layer adds warmth.</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="wear3" type="checkbox"/>
<label class="item-label" for="wear3">Coat/Down Jacket<span class="item-note">Windproof
                            Winter protection</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="wear4" type="checkbox"/>
<label class="item-label" for="wear4">Gloves / Wool Hat / Scarf<span class="item-note">Very important when going to the ski slopes</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="wear5" type="checkbox"/>
<label class="item-label" for="wear5">Thick socks (Wool Socks)</label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="wear6" type="checkbox"/>
<label class="item-label" for="wear6">Comfortable walking shoes (Sneakers)<span class="item-note">A lot of walking!</span></label>
</li>
</ul>
</div>
<div class="checklist-category">
<div class="category-title">
<span class="category-icon">💊</span> Personal items &amp; medicines (Personal &amp; Meds)
            </div>
<ul class="checklist-items">
<li class="checklist-item">
<input class="item-checkbox" id="pers1" type="checkbox"/>
<label class="item-label" for="pers1">Personal medicine / pain reliever / antihistamine</label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="pers2" type="checkbox"/>
<label class="item-label" for="pers2">Skincare / Lip Balm / Hand Cream<span class="item-note">The air is very dry.</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="pers3" type="checkbox"/>
<label class="item-label" for="pers3">sunglasses<span class="item-note">for ski slopes
                            (Snow reflection)</span></label>
</li>
<li class="checklist-item">
<input class="item-checkbox" id="pers4" type="checkbox"/>
<label class="item-label" for="pers4">Mask</label>
</li>
</ul>
</div>
<div class="footer">
<p>Get ready Then go have fun! ✈️🇯🇵</p>
</div>
</div>
<script src="../asset/js/common.js"></script>
</body>
</html>
